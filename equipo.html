<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipo | Generacion Y</title>
  <link rel="icon" href="432605790_929151685582053_5860969370641781263_n.jpg" type="image/x-icon">

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0b0b;
      color: #eaeaea;
    }

    /* alternar fondos para dar contraste premium */
    .section:nth-of-type(even) {
      background: #0f0f0f;
    }

    .section:nth-of-type(odd) {
      background: #141414;
    }

    .logo img {
      height: 5vh;
      border-radius: 50%;
    }

    header {
      position: fixed;
      width: 100%;
      padding: 5px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      font-weight: 600;
      letter-spacing: 3px;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      margin-left: 30px;
      font-size: 14px;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #d4af37;
    }

    /* SECCION */
    .section {
      padding: 140px 80px 100px;
      text-align: center;
    }

    /* TITULO */
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: #d4af37;
      letter-spacing: 3px;
      margin-bottom: 60px;
    }

    /* GRID EQUIPO */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      /* 🔥 4 SIEMPRE EN FILA */
      gap: 40px;
      max-width: 1000px;
      margin: auto;
    }

    @media (max-width: 900px) {
      .team-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .team-grid {
        grid-template-columns: 1fr;
      }
    }

    /* TARJETA */
    .team-member img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 10px;
      transition: 0.4s;
      filter: brightness(0.9);
    }

    .team-member:hover img {
      transform: scale(1.03);
      filter: brightness(1);
      box-shadow:
        0 0 15px rgba(212, 175, 55, 0.3),
        0 0 40px rgba(212, 175, 55, 0.15);
    }

    .team-member p {
      margin-top: 15px;
      color: #ccc;
      font-size: 14px;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <header>
    <a href="#" class="logo"><img src="432605790_929151685582053_5860969370641781263_n.jpg" alt="" /></a>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="equipo.html">Grupo</a>
      <a href="analisis.html">Análisis</a>
    </nav>
  </header>

  <section class="section">

    <h1 class="page-title">Los Debuggers</h1>

    <div class="team-grid">

      <div class="team-member">
        <img src="https://images.unsplash.com/photo-1556157382-97eda2d62296" alt="Oficinista hombre">
        <p>Marcos, Diego Ezequiel</p>
      </div>

      <div class="team-member">
        <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2" alt="Oficinista mujer">
        <p>Makarchuk, Zarina Antonella</p>
      </div>

      <div class="team-member">
        <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a" alt="Oficinista hombre">
        <p>Coito, José Fernando</p>
      </div>

      <div class="team-member">
        <img src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39" alt="Oficinista hombre">
        <p>Chamorro, Olegario Andrés</p>
      </div>
    </div>

  </section>

</body>

</html>
